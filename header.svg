<svg viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- ══ BACKGROUNDS ══ -->
    <radialGradient id="bgGlow" cx="50%" cy="100%" r="65%">
      <stop offset="0%"   stop-color="#3a0800" stop-opacity="1"/>
      <stop offset="40%"  stop-color="#1a0008" stop-opacity="1"/>
      <stop offset="100%" stop-color="#08000a" stop-opacity="1"/>
    </radialGradient>

    <radialGradient id="groundEmber" cx="50%" cy="100%" r="55%">
      <stop offset="0%"   stop-color="#ff4500" stop-opacity="0.45"/>
      <stop offset="40%"  stop-color="#cc2200" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="violetAura" cx="50%" cy="70%" r="40%">
      <stop offset="0%"   stop-color="#6b0050" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- ══ APPLE-STYLE FLAME COLUMNS ══
         Each is a tall radial gradient — white-yellow core at bottom,
         bleeding into orange → red → transparent at top.
         No shape. Pure light. -->

    <!-- Wide base bloom — anchors the whole fire -->
    <radialGradient id="flBaseWide" cx="50%" cy="100%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#fff5cc" stop-opacity="0.90"/>
      <stop offset="12%"  stop-color="#ffcc30" stop-opacity="0.75"/>
      <stop offset="32%"  stop-color="#ff6600" stop-opacity="0.52"/>
      <stop offset="58%"  stop-color="#cc1800" stop-opacity="0.22"/>
      <stop offset="80%"  stop-color="#6a0000" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Tall narrow column — gives vertical height -->
    <radialGradient id="flTall" cx="50%" cy="100%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#ffe880" stop-opacity="0.85"/>
      <stop offset="18%"  stop-color="#ff9020" stop-opacity="0.65"/>
      <stop offset="45%"  stop-color="#dd2200" stop-opacity="0.32"/>
      <stop offset="72%"  stop-color="#880000" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Mid-intensity column -->
    <radialGradient id="flMid" cx="50%" cy="100%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#ffdd60" stop-opacity="0.78"/>
      <stop offset="22%"  stop-color="#ff7010" stop-opacity="0.55"/>
      <stop offset="52%"  stop-color="#bb1500" stop-opacity="0.24"/>
      <stop offset="80%"  stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft secondary bloom -->
    <radialGradient id="flSoft" cx="50%" cy="100%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#ffcc40" stop-opacity="0.60"/>
      <stop offset="28%"  stop-color="#ff5500" stop-opacity="0.35"/>
      <stop offset="60%"  stop-color="#990000" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Blue-white wisp gradient (Sun Breathing) -->
    <radialGradient id="flWisp" cx="50%" cy="100%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#e8f4ff" stop-opacity="0.75"/>
      <stop offset="25%"  stop-color="#90c8ff" stop-opacity="0.50"/>
      <stop offset="55%"  stop-color="#4488ff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- ══ NAME GRADIENT ══ -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fff9f0"/>
      <stop offset="25%"  stop-color="#ffe8b0"/>
      <stop offset="55%"  stop-color="#ff9030"/>
      <stop offset="80%"  stop-color="#dd2800"/>
      <stop offset="100%" stop-color="#880000"/>
    </linearGradient>

    <!-- ══ FILTERS ══ -->
    <filter id="nameGlow" x="-25%" y="-60%" width="150%" height="220%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"  result="b1"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="14" result="b2"/>
      <feFlood flood-color="#ff8020" flood-opacity="0.55" result="c1"/>
      <feFlood flood-color="#ff4000" flood-opacity="0.40" result="c2"/>
      <feComposite in="c1" in2="b1" operator="in" result="g1"/>
      <feComposite in="c2" in2="b2" operator="in" result="g2"/>
      <feMerge><feMergeNode in="g2"/><feMergeNode in="g1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Heavy blur for the flame columns — this is the Apple trick.
         Feathered light, not shapes. -->
    <filter id="flameBloom" x="-40%" y="-30%" width="180%" height="150%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="flameTight" x="-20%" y="-15%" width="140%" height="135%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="wispBloom" x="-30%" y="-20%" width="160%" height="140%">
      <feGaussianBlur stdDeviation="11"/>
    </filter>
    <filter id="emberGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>

    <style>
      /* ══ FLAME COLUMN ANIMATIONS ══
         Each breathes with scale + opacity, no shape changes.
         Different durations so they never all sync — organic. */

      .fc1  { animation: fb1 3.2s ease-in-out infinite;       transform-origin: center bottom; }
      .fc2  { animation: fb2 2.8s ease-in-out infinite 0.4s;  transform-origin: center bottom; }
      .fc3  { animation: fb1 3.6s ease-in-out infinite 0.9s;  transform-origin: center bottom; }
      .fc4  { animation: fb3 2.5s ease-in-out infinite 0.2s;  transform-origin: center bottom; }
      .fc5  { animation: fb2 3.8s ease-in-out infinite 1.1s;  transform-origin: center bottom; }
      .fc6  { animation: fb1 2.9s ease-in-out infinite 0.6s;  transform-origin: center bottom; }
      .fc7  { animation: fb3 3.3s ease-in-out infinite 1.4s;  transform-origin: center bottom; }
      .fc8  { animation: fb2 2.6s ease-in-out infinite 0.3s;  transform-origin: center bottom; }
      .fc9  { animation: fb1 3.5s ease-in-out infinite 0.8s;  transform-origin: center bottom; }
      .fc10 { animation: fb3 3.0s ease-in-out infinite 1.6s;  transform-origin: center bottom; }
      .fc11 { animation: fb1 2.7s ease-in-out infinite 0.5s;  transform-origin: center bottom; }
      .fc12 { animation: fb2 3.4s ease-in-out infinite 1.2s;  transform-origin: center bottom; }

      /* Wisp columns */
      .wc1  { animation: wf1 4.2s ease-in-out infinite;       transform-origin: center bottom; }
      .wc2  { animation: wf2 3.8s ease-in-out infinite 0.8s;  transform-origin: center bottom; }
      .wc3  { animation: wf1 4.6s ease-in-out infinite 1.5s;  transform-origin: center bottom; }
      .wc4  { animation: wf2 3.5s ease-in-out infinite 2.0s;  transform-origin: center bottom; }
      .wc5  { animation: wf1 4.0s ease-in-out infinite 0.4s;  transform-origin: center bottom; }

      /* Three keyframe shapes — subtle scaleX drift simulates lean */
      @keyframes fb1 {
        0%,100% { transform: scaleX(1)    scaleY(1);    opacity: .88; }
        35%     { transform: scaleX(1.08) scaleY(1.12); opacity: 1;   }
        65%     { transform: scaleX(0.93) scaleY(0.94); opacity: .78; }
      }
      @keyframes fb2 {
        0%,100% { transform: scaleX(1)    scaleY(1);    opacity: .82; }
        30%     { transform: scaleX(0.91) scaleY(1.14); opacity: .96; }
        68%     { transform: scaleX(1.10) scaleY(0.92); opacity: 1;   }
      }
      @keyframes fb3 {
        0%,100% { transform: scaleX(1)    scaleY(1);    opacity: .85; }
        42%     { transform: scaleX(1.06) scaleY(1.10); opacity: 1;   }
        78%     { transform: scaleX(0.95) scaleY(0.96); opacity: .80; }
      }
      @keyframes wf1 {
        0%,100% { transform: scaleX(1)    scaleY(1);    opacity: .60; }
        50%     { transform: scaleX(0.88) scaleY(1.18); opacity: .82; }
      }
      @keyframes wf2 {
        0%,100% { transform: scaleX(1)    scaleY(1);    opacity: .55; }
        50%     { transform: scaleX(1.12) scaleY(0.90); opacity: .78; }
      }

      /* Embers */
      .e1 { animation: em1 3.0s ease-in-out infinite; }
      .e2 { animation: em2 2.5s ease-in-out infinite 0.4s; }
      .e3 { animation: em1 3.5s ease-in-out infinite 0.8s; }
      .e4 { animation: em2 2.8s ease-in-out infinite 1.2s; }
      .e5 { animation: em1 3.2s ease-in-out infinite 0.6s; }
      .e6 { animation: em2 2.6s ease-in-out infinite 1.5s; }
      .e7 { animation: em1 2.9s ease-in-out infinite 0.2s; }
      .e8 { animation: em2 3.4s ease-in-out infinite 1.0s; }
      @keyframes em1 {
        0%   { transform: translate(0,0)       scale(1);   opacity:.9; }
        50%  { transform: translate(-5px,-38px) scale(.7); opacity:.7; }
        100% { transform: translate(3px,-80px)  scale(.2); opacity:0;  }
      }
      @keyframes em2 {
        0%   { transform: translate(0,0)       scale(1);   opacity:.85; }
        50%  { transform: translate(7px,-32px)  scale(.65); opacity:.65; }
        100% { transform: translate(-4px,-75px) scale(.15); opacity:0;   }
      }

      /* Ground pulse */
      .gp { animation: gp 2.5s ease-in-out infinite; }
      @keyframes gp { 0%,100%{opacity:.8;} 50%{opacity:1;} }

      /* Name */
      .nt { animation: nf 2.0s ease-in-out infinite; }
      @keyframes nf {
        0%,100% { opacity:1;   }
        45%     { opacity:.92; }
      }
    </style>
  </defs>

  <!-- ══ BACKGROUND ══ -->
  <rect width="900" height="280" fill="url(#bgGlow)" rx="12"/>
  <rect width="900" height="280" fill="url(#groundEmber)" class="gp"/>
  <rect width="900" height="280" fill="url(#violetAura)"/>

  <!-- ══════════════════════════════════════════════════════════
       FLAME LAYER — Apple approach:
       Each "flame" is a tall ellipse with a heavy Gaussian blur.
       The blur does ALL the work — it feathers the light so
       it looks like luminous heat rising, not a drawn shape.
       Two passes per column: WIDE bloom (outer warmth) +
       TIGHT core (bright centre).
       ══════════════════════════════════════════════════════════ -->

  <!-- ── WIDE BLOOM PASS — outer warmth, very soft ── -->
  <!-- These are large, blurry ellipses anchored to the bottom -->

  <ellipse class="fc1"  cx="80"  cy="280" rx="52"  ry="130" fill="url(#flBaseWide)" filter="url(#flameBloom)"/>
  <ellipse class="fc2"  cx="170" cy="280" rx="58"  ry="150" fill="url(#flBaseWide)" filter="url(#flameBloom)"/>
  <ellipse class="fc3"  cx="260" cy="280" rx="62"  ry="168" fill="url(#flBaseWide)" filter="url(#flameBloom)"/>
  <ellipse class="fc4"  cx="350" cy="280" rx="65"  ry="178" fill="url(#flBaseWide)" filter="url(#flameBloom)"/>
  <ellipse class="fc5"  cx="450" cy="280" rx="72"  ry="195" fill="url(#flBaseWide)" filter="url(#flameBloom)"/>
  <ellipse class="fc6"  cx="550" cy="280" rx="65"  ry="178" fill="url(#flBaseWide)" filter="url(#flameBloom)"/>
  <ellipse class="fc7"  cx="640" cy="280" rx="62"  ry="168" fill="url(#flBaseWide)" filter="url(#flameBloom)"/>
  <ellipse class="fc8"  cx="730" cy="280" rx="58"  ry="150" fill="url(#flBaseWide)" filter="url(#flameBloom)"/>
  <ellipse class="fc9"  cx="820" cy="280" rx="52"  ry="130" fill="url(#flBaseWide)" filter="url(#flameBloom)"/>

  <!-- ── TIGHT CORE PASS — brighter, narrower, sharper ── -->
  <ellipse class="fc10" cx="170" cy="280" rx="28"  ry="110" fill="url(#flTall)"     filter="url(#flameTight)"/>
  <ellipse class="fc11" cx="350" cy="280" rx="32"  ry="130" fill="url(#flTall)"     filter="url(#flameTight)"/>
  <ellipse class="fc12" cx="450" cy="280" rx="36"  ry="148" fill="url(#flTall)"     filter="url(#flameTight)"/>
  <ellipse class="fc1"  cx="550" cy="280" rx="32"  ry="130" fill="url(#flTall)"     filter="url(#flameTight)"/>
  <ellipse class="fc3"  cx="730" cy="280" rx="28"  ry="110" fill="url(#flTall)"     filter="url(#flameTight)"/>

  <!-- ── MID SECONDARY — fills gaps, adds density ── -->
  <ellipse class="fc4"  cx="120" cy="280" rx="40"  ry="120" fill="url(#flMid)"      filter="url(#flameBloom)"/>
  <ellipse class="fc6"  cx="305" cy="280" rx="44"  ry="138" fill="url(#flMid)"      filter="url(#flameBloom)"/>
  <ellipse class="fc8"  cx="500" cy="280" rx="46"  ry="145" fill="url(#flMid)"      filter="url(#flameBloom)"/>
  <ellipse class="fc2"  cx="600" cy="280" rx="44"  ry="138" fill="url(#flMid)"      filter="url(#flameBloom)"/>
  <ellipse class="fc5"  cx="780" cy="280" rx="40"  ry="122" fill="url(#flMid)"      filter="url(#flameBloom)"/>

  <!-- ── SOFT ACCENT — edge warmth ── -->
  <ellipse class="fc7"  cx="40"  cy="280" rx="36"  ry="95"  fill="url(#flSoft)"     filter="url(#flameBloom)"/>
  <ellipse class="fc9"  cx="860" cy="280" rx="36"  ry="95"  fill="url(#flSoft)"     filter="url(#flameBloom)"/>
  <ellipse class="fc11" cx="220" cy="280" rx="34"  ry="105" fill="url(#flSoft)"     filter="url(#flameBloom)"/>
  <ellipse class="fc3"  cx="680" cy="280" rx="34"  ry="105" fill="url(#flSoft)"     filter="url(#flameBloom)"/>

  <!-- ── WISP LAYER — blue-white Sun Breathing accents ── -->
  <ellipse class="wc1"  cx="155" cy="280" rx="18"  ry="145" fill="url(#flWisp)"     filter="url(#wispBloom)"/>
  <ellipse class="wc2"  cx="330" cy="280" rx="20"  ry="162" fill="url(#flWisp)"     filter="url(#wispBloom)"/>
  <ellipse class="wc3"  cx="450" cy="280" rx="22"  ry="175" fill="url(#flWisp)"     filter="url(#wispBloom)"/>
  <ellipse class="wc4"  cx="570" cy="280" rx="20"  ry="162" fill="url(#flWisp)"     filter="url(#wispBloom)"/>
  <ellipse class="wc5"  cx="745" cy="280" rx="18"  ry="145" fill="url(#flWisp)"     filter="url(#wispBloom)"/>

  <!-- ══ EMBER PARTICLES ══ (kept exactly from original) -->
  <circle class="e1" cx="180" cy="248" r="3.5" fill="#ffe080" filter="url(#emberGlow)"/>
  <circle class="e1" cx="180" cy="248" r="1.8" fill="#ffffff"/>
  <circle class="e2" cx="310" cy="255" r="3"   fill="#ffb040" filter="url(#emberGlow)"/>
  <circle class="e2" cx="310" cy="255" r="1.5" fill="#fff5cc"/>
  <circle class="e3" cx="450" cy="242" r="4"   fill="#ffe060" filter="url(#emberGlow)"/>
  <circle class="e3" cx="450" cy="242" r="2"   fill="#ffffff"/>
  <circle class="e4" cx="560" cy="252" r="3.2" fill="#ffa030" filter="url(#emberGlow)"/>
  <circle class="e4" cx="560" cy="252" r="1.6" fill="#fff0bb"/>
  <circle class="e5" cx="680" cy="246" r="3.8" fill="#ffe070" filter="url(#emberGlow)"/>
  <circle class="e5" cx="680" cy="246" r="1.9" fill="#ffffff"/>
  <circle class="e6" cx="88"  cy="250" r="2.8" fill="#ffcc40" filter="url(#emberGlow)"/>
  <circle class="e6" cx="88"  cy="250" r="1.4" fill="#fffadc"/>
  <circle class="e7" cx="790" cy="244" r="3.4" fill="#ff9820" filter="url(#emberGlow)"/>
  <circle class="e7" cx="790" cy="244" r="1.7" fill="#ffeebb"/>
  <circle class="e8" cx="250" cy="258" r="2.5" fill="#ffdd50" filter="url(#emberGlow)"/>
  <circle class="e8" cx="250" cy="258" r="1.2" fill="#ffffff"/>

  <!-- ══ NAME & TEXT ══ (kept exactly from original) -->
  <text
    x="450" y="148"
    font-family="'Segoe UI', Arial Black, sans-serif"
    font-size="64"
    font-weight="900"
    text-anchor="middle"
    letter-spacing="3"
    fill="url(#nameGrad)"
    class="nt"
    filter="url(#nameGlow)">DEEPESH AHLAWAT</text>

  <text
    x="450" y="174"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="12"
    font-weight="600"
    text-anchor="middle"
    letter-spacing="5"
    fill="rgba(255,190,100,0.75)">AGENTIC AI ENGINEER  ·  NEW DELHI, INDIA</text>

  <!-- ══ CHIPS ══ (kept exactly from original) -->
  <rect x="178" y="192" width="122" height="24" rx="12" fill="rgba(140,40,0,0.35)" stroke="rgba(255,160,30,0.5)" stroke-width="0.8"/>
  <text x="239" y="208" font-family="'Segoe UI',Arial,sans-serif" font-size="10.5" font-weight="700"
    fill="#fed7aa" text-anchor="middle" letter-spacing="0.3">🥇 Baidu 2026</text>

  <rect x="312" y="192" width="130" height="24" rx="12" fill="rgba(140,40,0,0.35)" stroke="rgba(255,160,30,0.5)" stroke-width="0.8"/>
  <text x="377" y="208" font-family="'Segoe UI',Arial,sans-serif" font-size="10.5" font-weight="700"
    fill="#fed7aa" text-anchor="middle" letter-spacing="0.3">🥇 ISRO BAH'25</text>

  <rect x="454" y="192" width="148" height="24" rx="12" fill="rgba(0,30,100,0.30)" stroke="rgba(100,170,255,0.45)" stroke-width="0.8"/>
  <text x="528" y="208" font-family="'Segoe UI',Arial,sans-serif" font-size="10.5" font-weight="700"
    fill="#bfdbfe" text-anchor="middle" letter-spacing="0.3">🏅 Amazon ML Top 70</text>

  <rect x="614" y="192" width="148" height="24" rx="12" fill="rgba(60,0,100,0.28)" stroke="rgba(180,120,255,0.45)" stroke-width="0.8"/>
  <text x="688" y="208" font-family="'Segoe UI',Arial,sans-serif" font-size="10.5" font-weight="700"
    fill="#e9d5ff" text-anchor="middle" letter-spacing="0.3">✨ CGPA 9.41 · Rank 3</text>

</svg>
